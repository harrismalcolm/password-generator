<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <h1>Generate a <span>random password</span></h1>
            <p class="header--text">Never use an insecure password again.</p>
            <div class="container--sub">
            <button onclick="generatePassword()" id="generate-password">Generate passwords</button>
                <div>
                    <p>Set a password length: </p>
                    <input id="password-length" type="text" value="15" oninput="passwordInput()">
                </div>
            </div>
            <div class="container--passwords">
                <div>
                    <p id="password-one"></p>
                    <button onclick="savePasswordOne()">Copy to clipboard</button>
                    <span id="password-one-copied"></span>
                </div>
                <div> 
                    <p id="password-two"></p> 
                    <button onclick="savePasswordTwo()">Copy to clipboard</button>
                    <span id="password-two-copied"></span>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
